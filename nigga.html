<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Us If You Can!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
            font-family: Arial, sans-serif;
            touch-action: none; /* Prevents screen scrolling on touch devices */
        }

        /* Character styling */
        .character {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 60px; /* Size of the emoji/character */
            cursor: pointer;
            user-select: none;
            /* Smooth but lightning-fast movement */
            transition: transform 0.15s ease-out; 
            z-index: 10;
        }

        /* Dialogue Cloud Styling */
        #dialogue-cloud {
            display: none; /* Hidden until caught */
            position: absolute;
            background: white;
            padding: 20px;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            color: #333;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
            width: 250px;
            transform: translate(-50%, -100%);
            /* Little tail for the speech bubble */
        }

        #dialogue-cloud::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            margin-left: -15px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div id="doraemon" class="character">🐱🤖</div>
    <div id="snoopy" class="character">🐶</div>
    <div id="woodstock" class="character">🐥</div>

    <div id="dialogue-cloud">
        ymr hurdn darchvaa mundag baina 😲<br>mai eniig iderei 🍬
    </div>

    <script>
        const characters = document.querySelectorAll('.character');
        const dialogueCloud = document.getElementById('dialogue-cloud');
        let isCaught = false;

        // Function to move a character to a random position on screen
        function jumpRandomly(element) {
            if (isCaught) return;
            // Keep them within the screen bounds
            const maxX = window.innerWidth - 80;
            const maxY = window.innerHeight - 80;
            const randomX = Math.max(0, Math.floor(Math.random() * maxX));
            const randomY = Math.max(0, Math.floor(Math.random() * maxY));
            
            element.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        // Initialize characters to run around constantly
        characters.forEach(char => {
            // Jump to a random spot every 700ms 
            let moveInterval = setInterval(() => jumpRandomly(char), 700);

            // Evade the mouse/finger when it gets close
            const evade = (e) => {
                if (!isCaught) {
                    jumpRandomly(char);
                }
            };

            char.addEventListener('mouseenter', evade);
            char.addEventListener('touchstart', evade, {passive: true});

            // The win condition: Successfully clicking/tapping a character
            char.addEventListener('mousedown', catchCharacters);
            // Optional: If you want touch to count as a catch before it evades, 
            // comment out the 'touchstart' event above and use this instead:
            // char.addEventListener('touchstart', catchCharacters); 
        });

        function catchCharacters() {
            if (isCaught) return;
            isCaught = true;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // Stop their erratic behavior and line them up in the center
            const doraemon = document.getElementById('doraemon');
            const snoopy = document.getElementById('snoopy');
            const woodstock = document.getElementById('woodstock');

            doraemon.style.transform = `translate(${centerX - 80}px, ${centerY}px)`;
            snoopy.style.transform = `translate(${centerX}px, ${centerY}px)`;
            woodstock.style.transform = `translate(${centerX + 80}px, ${centerY}px)`;

            // Show the dialogue cloud above the middle character (Snoopy) after a short delay
            setTimeout(() => {
                dialogueCloud.style.display = 'block';
                dialogueCloud.style.left = `${centerX + 30}px`; 
                dialogueCloud.style.top = `${centerY - 20}px`;
            }, 300); // 300ms delay to let them gather first
        }

        // Give them initial scattered positions when the page loads
        window.onload = () => {
            characters.forEach(char => jumpRandomly(char));
        };
    </script>
</body>
</html>
